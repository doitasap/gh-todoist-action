name: 'Todoist Sync from GitHub Issue'
description: 'Sync GitHub issue events (opened/closed) to Todoist tasks. Modes: create-task, close-by-issue, label-by-issue. Resolves project by name and matches existing tasks by [#N] prefix + issue URL.'
author: 'doitasap'
branding:
  icon: 'check-square'
  color: 'red'

inputs:
  mode:
    description: 'Action mode: "create-task" | "close-by-issue" | "label-by-issue"'
    required: true
  project-name:
    description: 'Todoist project name (exact match, e.g. "link-drawer", "got-wa")'
    required: true
  labels:
    description: 'Labels for the Todoist task. Used by create-task (full label SET on the created task) and label-by-issue (labels to ADD/union onto the matched task, preserving existing labels). Accepts comma-separated string (e.g. "링크서랍,Github issue") or JSON array string for labels containing commas (e.g. ''["곧, 와","Github issue"]''). NOTE: for label-by-issue, always set this explicitly — the default below will otherwise attach "Github issue".'
    required: false
    default: 'Github issue'
  issue-number:
    description: 'GitHub issue number (default: github.event.issue.number)'
    required: false
    default: ${{ github.event.issue.number }}
  issue-title:
    description: 'GitHub issue title (default: github.event.issue.title)'
    required: false
    default: ${{ github.event.issue.title }}
  issue-url:
    description: 'GitHub issue HTML URL (default: github.event.issue.html_url)'
    required: false
    default: ${{ github.event.issue.html_url }}
  issue-body:
    description: 'GitHub issue body (default: github.event.issue.body)'
    required: false
    default: ${{ github.event.issue.body }}

runs:
  using: composite
  steps:
    - name: Run Todoist client
      shell: bash
      env:
        ACTION_MODE: ${{ inputs.mode }}
        PROJECT_NAME: ${{ inputs.project-name }}
        LABELS: ${{ inputs.labels }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        ISSUE_TITLE: ${{ inputs.issue-title }}
        ISSUE_URL: ${{ inputs.issue-url }}
        ISSUE_BODY: ${{ inputs.issue-body }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/todoist_client.py"
